          function saveUser() {
            var lname = document.getElementById("lname");
            var fname = document.getElementById("fname");
            var mname = document.getElementById("mname");
            var gender = document.getElementById("gender");
            var cstatus = document.getElementById("cstatus");
            var address = document.getElementById("address");
            var role = document.getElementById("role");
            var astatus = document.getElementById("astatus");
            var uname = document.getElementById("username");
            var pword = document.getElementById("password");
            if (lname.value == "") {
               alert("Please enter your lastname to proceed!");
            } else if (fname.value == "") {
               alert("Please enter your firstname to proceed!");
            } else if (mname.value == "") {
               alert("Please enter your middlename to proceed!");
            } else if (gender.value == "0") {
                alert("Please select a gender.");
            } else if (cstatus.value == "0") {
                alert("PLease select a civil status.");
            } else if (role.value == "0") {
                alert("Please select a role.");
            } else if (astatus.value == "0") {
                alert("Please select account status.");
            } else if (uname.value == "") {
               alert("Please enter username to proceed!.");
            } else if (pword.value == "") {
               alert("Please enter password to proceed!.");
            } else {
                fetch("php/saveUser.php?lastname=" + lname.value + "&firstname=" + fname.value + "&middlename=" + mname.value + "&gender=" + gender.value + "&civilstatus=" + cstatus.value + "&address=" + address.value + "&role=" + role.value + "&accountstatus=" + astatus.value + "&username=" + uname.value + "&password=" + pword.value)
                .then(response => response.text());
                alert("Successfully saved!");
                usersList();
            }
          }

          function openSalesReport(period) {
            var modal = document.getElementById("salesReportModal");
            var modalTitle = document.getElementById("salesModalTitle");
            var modalBody = document.getElementById("salesModalBody");
            var modalHeader = document.querySelector(".sales-modal-header");          

            modal.style.display = "flex";
            modalBody.innerHTML = "Loading...";          

            modalHeader.classList.remove("blue-header", "green-header", "purple-header");          

            if (period == "daily") {
                modalTitle.innerHTML = "Daily Sales Details";
                modalHeader.classList.add("blue-header");
            } 
            else if (period == "monthly") {
                modalTitle.innerHTML = "Monthly Sales Details";
                modalHeader.classList.add("green-header");
            } 
            else if (period == "yearly") {
                modalTitle.innerHTML = "Yearly Sales Details";
                modalHeader.classList.add("purple-header");
            }          
            fetch("php/salesReportDetails.php?period=" + period + "&color=" + period)
            .then(response => response.text())
            .then(data => {
                modalBody.innerHTML = data;
            });
        }
          function closeSalesReport() {
            var modal = document.getElementById("salesReportModal");
            modal.style.display = "none";
        }        

          window.onclick = function(event) {
            var modal = document.getElementById("salesReportModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
